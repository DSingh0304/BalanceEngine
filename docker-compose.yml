version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: BalanceEngine_postgres
    environment:
      POSTGRES_DB: balance_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: BalanceEngine_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: BalanceEngine_server
    environment:
      PORT: 8080
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: balance_engine
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-change_me_to_something_very_long_and_secure_12345}
      JWT_EXPIRES_IN: 7d
      REDIS_URL: redis://redis:6379
      IDEMPOTENCY_TTL_SECONDS: 86400
      CLIENT_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: BalanceEngine_client
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
